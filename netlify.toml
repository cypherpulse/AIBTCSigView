[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy agent lookups in production (equivalent to local Vite proxy).
[[redirects]]
  from = "/api/agents/*"
  to = "https://aibtc.com/api/agents/:splat"
  status = 200
  force = true

# SPA fallback for React Router routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
